[project]
name = "poo-flow-runtime"
version = "0.1.0"
description = "Python runtime consumer for the POO Flow C ABI."
readme = { file = "README.org", content-type = "text/plain" }
requires-python = ">=3.11"
dependencies = [
    "anyio>=4.14.1",
    "cffi>=2.0.0",
    "pyturso>=0.6.1",
]

[project.scripts]
poo-flow-build-profile = "poo_flow_runtime.build_profile:main"
poo-flow-jsonschema-contract = "poo_flow_runtime.json_schema_contract:main"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "python-lang-project-harness[pytest] ; python_full_version >= '3.12'",
]

[build-system]
requires = ["setuptools>=75", "wheel", "cffi>=2.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
poo_flow_runtime = [
  "_native/lib/*",
  "projections/*.ss",
  "projections/*.sexp",
]

[tool.pytest.ini_options]
addopts = ["--python-project-harness"]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv.sources]
python-lang-project-harness = { git = "https://github.com/tao3k/python-lang-project-harness" }
