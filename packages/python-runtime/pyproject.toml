[project]
name = "poo-flow-runtime"
version = "0.1.0"
description = "Python runtime consumer for the POO Flow C ABI."
readme = { file = "README.org", content-type = "text/plain" }
requires-python = ">=3.11"
dependencies = []

[project.scripts]
poo-flow-runtime-probe = "poo_flow_runtime.probe:main"
poo-flow-runtime-validate = "poo_flow_runtime.validation:main"

[dependency-groups]
dev = [
  "pytest>=8.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/poo_flow_runtime"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
