name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lean-proof:
    name: POO Flow Lean proof bridge
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Restore Lean cache
        id: lean-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.elan
            packages/proof/lean/.lake
          key: lean-proof-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/proof/lean/lean-toolchain', 'packages/proof/lean/lakefile.lean', 'packages/proof/lean/lake-manifest.json') }}
          restore-keys: |
            lean-proof-${{ runner.os }}-${{ runner.arch }}-

      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/lake" ]; then
            curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          cd packages/proof/lean
          "$HOME/.elan/bin/lake" --version

      - name: Build Lean proof bridge
        working-directory: packages/proof/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build
          lake build ffiSmoke
          .lake/build/bin/ffiSmoke

      - name: Save Lean cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.elan
            packages/proof/lean/.lake
          key: lean-proof-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/proof/lean/lean-toolchain', 'packages/proof/lean/lakefile.lean', 'packages/proof/lean/lake-manifest.json') }}

  native:
    name: POO Flow Gerbil package (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: source-v0.18.2-4-gadd92248
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
            gerbil-install: source
            gerbil-home-version: ""
          - os: macos-latest
            gerbil-label: homebrew-v0.18.2
            gerbil-ref: ""
            gerbil-install: homebrew
            gerbil-home-version: v0.18.2
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ci/ccache
      CCACHE_MAXSIZE: 2G
      GERBIL_ARCH_PROFILE: portable
      GERBIL_REQUIRE_CCACHE: 1
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            ccache \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v3
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install ccache gerbil-scheme jq openssl pkg-config sqlite zlib
          brew link --overwrite gerbil-scheme

      - name: Select macOS Gerbil compiler
        if: runner.os == 'macOS' && matrix.gerbil-install == 'source'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          gcc_bin="$(
            find "$gcc_prefix/bin" -maxdepth 1 -type f -name 'gcc-[0-9]*' \
              | awk -F- '{print $NF "\t" $0}' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          test -n "$gcc_bin"
          test -x "$gcc_bin"
          echo "GERBIL_GCC=$gcc_bin" >> "$GITHUB_ENV"
          "$gcc_bin" --version

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v3

      - name: Resolve native Gerbil ABI capability
        id: gerbil-native-abi
        shell: bash
        run: |
          set -euo pipefail
          native_abi="$(bash tools/bazel/native_abi_fingerprint.sh "${GERBIL_GCC:-}" "$GERBIL_ARCH_PROFILE")"
          echo "GERBIL_NATIVE_ABI=$native_abi" >> "$GITHUB_ENV"
          echo "fingerprint=$native_abi" >> "$GITHUB_OUTPUT"
          echo "Gerbil native ABI: $native_abi"

      - name: Restore Gerbil bootstrap ccache
        id: gerbil-ccache-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/ccache
          key: gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-
            ccache-python-runtime-wheel-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name == 'push' }}
          disk-cache: ci-${{ runner.os }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}
          repository-cache: true

      - name: Restore Gerbil install cache
        if: matrix.gerbil-install == 'source'
        id: gerbil-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}

      - name: Build Gerbil
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        run: |
          if [ -n "${GERBIL_GCC:-}" ]; then
            export CC="$GERBIL_GCC"
          fi
          bash tools/bazel/bootstrap_gerbil_toolchain.sh

      - name: Show Gerbil bootstrap ccache stats
        if: ${{ always() && matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true' }}
        run: ccache --show-stats

      - name: Save Gerbil bootstrap ccache
        if: ${{ always() && matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/ccache
          key: gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Gerbil bootstrap phase receipt
        if: always() && matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gerbil-bootstrap-receipt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}
          path: .ci/gerbil-src/${{ matrix.gerbil-label }}/.poo-flow-bootstrap-state.json
          if-no-files-found: warn
          retention-days: 7

      - name: Save Gerbil install cache
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}

      - name: Use Homebrew Gerbil
        if: matrix.gerbil-install == 'homebrew'
        run: |
          set -euo pipefail
          prefix="$(brew --prefix gerbil-scheme)"
          echo "GERBIL_PREFIX=$prefix" >> "$GITHUB_ENV"
          "$prefix/bin/gxi" --version | tee /tmp/gerbil-version.txt
          "$prefix/bin/gsc" -v | tee /tmp/gambit-version.txt
          grep -F "v0.18.2" /tmp/gerbil-version.txt
          grep -F "v4.9.7" /tmp/gambit-version.txt

      - name: Resolve Homebrew Gerbil capability root
        if: matrix.gerbil-install == 'homebrew'
        run: |
          set -euo pipefail
          prefix="$(brew --prefix gerbil-scheme)"
          cellar="$(brew --cellar gerbil-scheme)"
          gerbil_home=""
          candidates=("$prefix/current" "$prefix"/v* "$prefix")
          for keg in "$cellar"/*; do
            candidates+=("$keg/current" "$keg"/v* "$keg")
          done
          while IFS= read -r gxi_path; do
            candidates+=("${gxi_path%/bin/gxi}")
          done < <(brew list gerbil-scheme | awk '/\/bin\/gxi$/')

          for candidate in "${candidates[@]}"; do
            if [ -x "$candidate/bin/gxi" ] && \
               [ -x "$candidate/bin/gsc" ] && \
               [ -d "$candidate/lib" ]; then
              gerbil_home="$(cd "$candidate" && pwd -P)"
              break
            fi
          done
          if [ -z "$gerbil_home" ]; then
            echo "No usable Homebrew Gerbil capability root below $prefix or $cellar" >&2
            brew list gerbil-scheme >&2
            exit 1
          fi
          gerbil_home_version="${{ matrix.gerbil-home-version }}"
          if [ -n "$gerbil_home_version" ]; then
            case "$gerbil_home" in
              */"$gerbil_home_version")
                versioned_home="$gerbil_home"
                ;;
              *)
                versioned_home="$gerbil_home/$gerbil_home_version"
                if [ ! -e "$versioned_home" ]; then
                  mkdir -p "$versioned_home"
                fi
                for capability in bin include lib share; do
                  if [ -e "$gerbil_home/$capability" ] && \
                     [ ! -e "$versioned_home/$capability" ]; then
                    ln -s "../$capability" "$versioned_home/$capability"
                  fi
                done
                ;;
            esac
            if [ ! -x "$versioned_home/bin/gxi" ] || \
               [ ! -x "$versioned_home/bin/gsc" ] || \
               [ ! -d "$versioned_home/lib" ]; then
              echo "Incomplete Gerbil versioned capability view: $versioned_home" >&2
              exit 1
            fi
            echo "Resolved Gerbil versioned capability view: $versioned_home"
          fi
          echo "Resolved Homebrew Gerbil capability root: $gerbil_home"
          echo "GERBIL_PREFIX=$gerbil_home" >> "$GITHUB_ENV"
          echo "GERBIL_HOME=$gerbil_home" >> "$GITHUB_ENV"
          echo "$gerbil_home/bin" >> "$GITHUB_PATH"

      - name: Activate Gerbil
        run: |
          set -euo pipefail
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          gsc_wrapper="$RUNNER_TEMP/gerbil-gsc"
          {
            printf '#!/bin/sh\n'
            printf 'exec "%s" "-:~~=%s,~~bin=%s,~~include=%s,~~lib=%s" "$@"\n' "$GERBIL_PREFIX/bin/gsc" "$GERBIL_PREFIX" "$GERBIL_PREFIX/bin" "$GERBIL_PREFIX/include" "$GERBIL_PREFIX/lib"
          } > "$gsc_wrapper"
          chmod +x "$gsc_wrapper"
          echo "GERBIL_GSC=$gsc_wrapper" >> "$GITHUB_ENV"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" help >/dev/null
          "$gsc_wrapper" -v
          tmp_smoke="$(mktemp -d)"
          printf '(display "ok")\n' > "$tmp_smoke/gsc-smoke.scm"
          "$gsc_wrapper" -target C "$tmp_smoke/gsc-smoke.scm"
          test -f "$tmp_smoke/gsc-smoke.o1"
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'
          "$GERBIL_PREFIX/bin/gxpkg" list

      - name: Restore Gerbil gxpkg capability overlay
        if: matrix.gerbil-install == 'homebrew'
        id: gerbil-gxpkg-overlay-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/gerbil-gxpkg-overlay/${{ matrix.gerbil-label }}
          key: gerbil-gxpkg-overlay-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-add922481cec81d05431db014bcb91b30485cf21

      - name: Activate Gerbil gxpkg provider capability
        if: matrix.gerbil-install == 'homebrew'
        env:
          GERBIL_GXPKG_OVERLAY: ${{ github.workspace }}/.ci/gerbil-gxpkg-overlay/${{ matrix.gerbil-label }}
          GERBIL_GXPKG_REF: add922481cec81d05431db014bcb91b30485cf21
        run: bazel run //tools/bazel:activate_gxpkg_overlay

      - name: Save Gerbil gxpkg capability overlay
        if: matrix.gerbil-install == 'homebrew' && steps.gerbil-gxpkg-overlay-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/gerbil-gxpkg-overlay/${{ matrix.gerbil-label }}
          key: gerbil-gxpkg-overlay-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-add922481cec81d05431db014bcb91b30485cf21

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg', 'manifest.ss') }}

      - name: Install Gerbil package dependencies from gerbil.pkg
        run: |
          set -euo pipefail
          package_cache_ready=false
          if [ -d .gerbil/lib ]; then
            if GERBIL_PATH="$GITHUB_WORKSPACE/.gerbil" \
              gxi tools/ci/gerbil-deps-ready.ss; then
              package_cache_ready=true
            else
              echo "Cached Gerbil packages are missing compiled dependency libraries; rebuilding"
            fi
          fi
          if [ "$package_cache_ready" = "true" ]; then
            echo "Using cached Gerbil package dependency build products"
          else
            bazel run //scheme:deps
          fi
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg', 'manifest.ss') }}

      - name: Validate Bazel target graph
        run: bazel query //...

      - name: Build Scheme package through Bazel
        run: bazel build //scheme:compile

      - name: Run Bazel acceptance suites
        run: |
          bazel test //scheme:tests
          bazel test //bindings/runtime-c:runtime_c_tests //bindings/runtime-c/bundle-v1:bundle_v1_tests
