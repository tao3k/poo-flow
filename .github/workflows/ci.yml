name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: POO Flow Gerbil package (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: source-v0.18.2-4-gadd92248
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
            gerbil-install: source
          - os: macos-latest
            gerbil-label: homebrew-v0.18.2
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
            gerbil-install: homebrew
    env:
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v1
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew list --formula gambit-scheme >/dev/null 2>&1 && brew unlink gambit-scheme || true
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install gerbil-scheme jq openssl pkg-config sqlite zlib
          brew link --overwrite gerbil-scheme

      - name: Select macOS Gerbil compiler
        if: runner.os == 'macOS' && matrix.gerbil-install == 'source'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          gcc_bin="$(
            find "$gcc_prefix/bin" -maxdepth 1 -type f -name 'gcc-[0-9]*' \
              | awk -F- '{print $NF "\t" $0}' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          test -n "$gcc_bin"
          test -x "$gcc_bin"
          echo "GERBIL_GCC=$gcc_bin" >> "$GITHUB_ENV"
          "$gcc_bin" --version

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v1

      - name: Restore Gerbil install cache
        if: matrix.gerbil-install == 'source'
        id: gerbil-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}
          restore-keys: |
            gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Build Gerbil
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        run: |
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          mkdir -p "$(dirname "$GERBIL_SRC")" "$(dirname "$GERBIL_PREFIX")"
          rm -rf "$GERBIL_SRC" "$GERBIL_PREFIX"
          git clone https://git.cons.io/mighty-gerbils/gerbil "$GERBIL_SRC"
          cd "$GERBIL_SRC"
          git checkout "$GERBIL_REF"
          ./configure --prefix="$GERBIL_PREFIX"
          echo "(def (gerbil-version-string) \"ci-${GERBIL_REF}\")" > src/gerbil/runtime/version.ss
          . ./build-env.sh
          for target in prepare gambit boot-gxi stage0 stage1 stdlib libgerbil lang r7rs-large srfi tools; do
            GERBIL_BUILD_CORES="$(build_cores)" ./src/build.sh "$target"
          done
          ./install.sh

      - name: Save Gerbil install cache
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}

      - name: Use Homebrew Gerbil
        if: matrix.gerbil-install == 'homebrew'
        run: |
          set -euo pipefail
          prefix="$(brew --prefix gerbil-scheme)"
          echo "GERBIL_PREFIX=$prefix" >> "$GITHUB_ENV"
          "$prefix/bin/gxi" --version | tee /tmp/gerbil-version.txt
          grep -F "v0.18.2" /tmp/gerbil-version.txt

      - name: Activate Gerbil
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            gerbil_real_prefix="$(cd "$GERBIL_PREFIX" && pwd -P)"
            gsc_path="$(command -v gsc || true)"
            if [ -z "$gsc_path" ] && [ -x "$GERBIL_PREFIX/bin/gsc" ]; then
              gsc_path="$GERBIL_PREFIX/bin/gsc"
            fi
            if [ -n "$gsc_path" ]; then
              mkdir -p "$gerbil_real_prefix/v0.18.2/bin"
              ln -sf "$gsc_path" "$gerbil_real_prefix/v0.18.2/bin/gsc"
            fi
          fi
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" help >/dev/null
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'
          "$GERBIL_PREFIX/bin/gxpkg" list

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg') }}
          restore-keys: |
            gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}-

      - name: Install Gerbil package dependencies from gerbil.pkg
        env:
          GERBIL_PKG_CACHE_HIT: ${{ steps.gerbil-pkg-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          reset_stale_package_cache() {
            gxpkg uninstall -f \
              github.com/tao3k/gerbil-scheme-language-project-harness \
              git.cons.io/mighty-gerbils/gerbil-poo \
              github.com/mighty-gerbils/gerbil-poo \
              git.cons.io/mighty-gerbils/gerbil-utils \
              github.com/mighty-gerbils/gerbil-utils >/dev/null 2>&1 || true
            rm -rf \
              "$HOME/.gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness" \
              "$HOME/.gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-poo" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-poo" \
              "$HOME/.gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-utils" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-utils" \
              ".gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness" \
              ".gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-poo" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-poo" \
              ".gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-utils" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-utils"
            rm -f "$HOME/.gerbil/pkg/manifest.ss" ".gerbil/pkg/manifest.ss"
            gxpkg retag >/dev/null 2>&1 || true
          }
          link_legacy_gerbil_utils_package() {
            local src=".gerbil/pkg/github.com/mighty-gerbils/gerbil-utils"
            mkdir -p "$(dirname "$src")"
            git clone https://github.com/mighty-gerbils/gerbil-utils.git "$src"
            gxpkg link git.cons.io/mighty-gerbils/gerbil-utils "$src"
            GERBIL_BUILD_CORES="$(build_cores)" gxpkg build git.cons.io/mighty-gerbils/gerbil-utils
          }
          mkdir -p "$HOME/.gerbil/pkg"
          gxpkg dir --add git.cons.io/mighty-gerbils/gerbil-directory
          if [ "$GERBIL_PKG_CACHE_HIT" = "true" ]; then
            echo "Using cached Gerbil package dependencies"
          else
            reset_stale_package_cache
            link_legacy_gerbil_utils_package
            GERBIL_BUILD_CORES="$(build_cores)" gxpkg deps --install
          fi
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg') }}

      - name: Clean package outputs
        run: gxpkg clean

      - name: Build package
        run: |
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          GERBIL_BUILD_CORES="$(build_cores)" gxpkg build

      - name: Build poo-flow CLI binary
        shell: bash
        run: |
          set -euo pipefail
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          GERBIL_BUILD_CORES="$(build_cores)" gxpkg env ./build.ss compile --release --optimized
          test -x .gerbil/bin/poo-flow
          .gerbil/bin/poo-flow --help >/tmp/poo-flow-help.txt
          test -s /tmp/poo-flow-help.txt

      - name: Run package test roots through poo-flow
        shell: bash
        run: |
          set -euo pipefail
          .gerbil/bin/poo-flow test t/unit-tests.ss
          .gerbil/bin/poo-flow test t/contract-tests.ss
          .gerbil/bin/poo-flow test t/integration-tests.ss
