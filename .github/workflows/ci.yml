name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      refresh_lock:
        description: Generate and verify the cross-platform Bazel module lock
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lean-proof:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.refresh_lock }}
    name: POO Flow Lean proof bridge
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Restore Lean cache
        id: lean-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.elan
            packages/proof/lean/.lake
          key: lean-proof-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/proof/lean/lean-toolchain', 'packages/proof/lean/lakefile.lean', 'packages/proof/lean/lake-manifest.json') }}
          restore-keys: |
            lean-proof-${{ runner.os }}-${{ runner.arch }}-

      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/lake" ]; then
            curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          cd packages/proof/lean
          "$HOME/.elan/bin/lake" --version

      - name: Build Lean proof bridge
        working-directory: packages/proof/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build
          lake build ffiSmoke
          .lake/build/bin/ffiSmoke

      - name: Save Lean cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.elan
            packages/proof/lean/.lake
          key: lean-proof-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/proof/lean/lean-toolchain', 'packages/proof/lean/lakefile.lean', 'packages/proof/lean/lake-manifest.json') }}

  external-module-linux-full:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.refresh_lock }}
    name: POO Flow external Bazel module (linux-amd64, full)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            libsqlite3-dev \
            libssl-dev \
            pkg-config \
            zlib1g-dev

      - name: Declare Bazel disk-cache generation
        shell: bash
        env:
          POO_FLOW_BAZEL_CACHE_GENERATION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ci/bazel-cache-generation
          printf '# POO Flow external-module cache generation: %s\n' \
            "$POO_FLOW_BAZEL_CACHE_GENERATION" \
            > .ci/bazel-cache-generation/BUILD.bazel

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          cache-version: 1
          disk-cache: ci-${{ runner.os }}-external-module-full-v1
          repository-cache: true

      - name: Verify Bazel module lock
        run: bazel mod deps --lockfile_mode=error

      - name: Validate external Bazel startup arguments
        timeout-minutes: 2
        run: bash tools/ci/test_external_bazel_module_args_test.sh

      - name: Validate POO Flow as an external Bazel module
        timeout-minutes: 12
        env:
          POO_FLOW_EXTERNAL_BAZEL_OUTPUT_BASE: ${{ runner.temp }}/poo-flow-external-bazel-output-base-v1
          POO_FLOW_EXTERNAL_TEST_MODE: full
        run: tools/ci/test_external_bazel_module.sh

  native-linux:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.refresh_lock }}
    name: POO Flow Gerbil package (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.job-timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: prebuilt-v0.18.2-07c84815
            gerbil-install: prebuilt
            gerbil-formula: ""
            dependency-timeout-minutes: 12
            external-module-mode: analysis
            job-timeout-minutes: 20
    steps: &native-steps
      - name: Checkout poo-flow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
          pkg-config \
          sqlite3 \
          valgrind \
          zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v3
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install jq openssl pkg-config sqlite zlib

      - name: Install macOS Gerbil bottle
        if: runner.os == 'macOS' && matrix.gerbil-install == 'homebrew'
        id: homebrew-gerbil-install
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_BOTTLE_SOURCE_FALLBACK: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          INSTALL_BUDGET_SECONDS: 120
        shell: bash
        run: |
          set -euo pipefail
          formula="${{ matrix.gerbil-formula }}"
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          start_seconds=$SECONDS

          set +e
          brew install --force-bottle "$formula"
          install_status=$?
          set -e

          install_seconds=$((SECONDS - start_seconds))
          info_status=1
          poured_from_bottle=false
          if (( install_status == 0 )); then
            set +e
            formula_info="$(brew info --json=v2 "$formula" 2>/dev/null)"
            info_status=$?
            set -e
            if (( info_status == 0 )); then
              poured_from_bottle="$(jq -r '.formulae[0].installed[-1].poured_from_bottle // false' <<< "$formula_info")"
            fi
          fi

          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          receipt="$RUNNER_TEMP/poo-flow-homebrew-gerbil-receipt.json"
          jq -n \
            --arg schema "poo-flow.ci.homebrew-gerbil-receipt.v1" \
            --arg formula "$formula" \
            --arg currentHeadSha "$GITHUB_SHA" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --arg startedAt "$started_at" \
            --arg completedAt "$completed_at" \
            --argjson pouredFromBottle "$poured_from_bottle" \
            --argjson installSeconds "$install_seconds" \
            --argjson installBudgetSeconds "$INSTALL_BUDGET_SECONDS" \
            --argjson installStatus "$install_status" \
            --argjson infoStatus "$info_status" \
            '{schema: $schema, formula: $formula, currentHeadSha: $currentHeadSha,
              runner: $runner, pouredFromBottle: $pouredFromBottle,
              startedAt: $startedAt, completedAt: $completedAt,
              installSeconds: $installSeconds,
              installBudgetSeconds: $installBudgetSeconds,
              installStatus: $installStatus, infoStatus: $infoStatus}' > "$receipt"
          echo "receipt=$receipt" >> "$GITHUB_OUTPUT"

          if (( install_status != 0 )); then
            exit "$install_status"
          fi
          if (( install_seconds > INSTALL_BUDGET_SECONDS )); then
            echo "Gerbil bottle install exceeded ${INSTALL_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi
          if (( info_status != 0 )) || [[ "$poured_from_bottle" != "true" ]]; then
            echo "Gerbil formula did not consume a published bottle" >&2
            exit 1
          fi

      - name: Upload macOS Gerbil install receipt
        if: always() && runner.os == 'macOS' && matrix.gerbil-install == 'homebrew'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-gerbil-install-receipt-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.homebrew-gerbil-install.outputs.receipt }}
          if-no-files-found: warn
          retention-days: 7

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v3

      - name: Declare Bazel disk-cache generation
        shell: bash
        env:
          POO_FLOW_BAZEL_CACHE_GENERATION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ci/bazel-cache-generation
          printf '# POO Flow CI cache generation: %s\n' \
            "$POO_FLOW_BAZEL_CACHE_GENERATION" \
            > .ci/bazel-cache-generation/BUILD.bazel

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          # setup-bazel hashes BUILD files and restores the newest matching
          # prefix when the exact generation is absent.  The ignored synthetic
          # BUILD file above advances that generation on every commit, so an
          # updated action cache is published instead of being trapped behind
          # GitHub's immutable exact key.  Forks remain restore-only.
          cache-save: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          cache-version: 1
          disk-cache: ci-${{ runner.os }}-${{ matrix.gerbil-label }}
          repository-cache: true

      - name: Verify Bazel module lock
        run: bazel mod deps --lockfile_mode=error

      - name: Validate POO Flow as an external Bazel module
        timeout-minutes: ${{ matrix.dependency-timeout-minutes }}
        env:
          POO_FLOW_EXTERNAL_TEST_MODE: ${{ matrix.external-module-mode }}
        run: tools/ci/test_external_bazel_module.sh

      - name: Resolve shared Gerbil capability
        id: gerbil-native-abi
        shell: bash
        run: |
          set -euo pipefail
          set +e
          native_abi_output="$(
            bazel run --ui_event_filters=-info --noshow_progress \
              @gerbil_bazel//gerbil:native_abi_fingerprint 2>&1
          )"
          native_abi_status=$?
          set -e
          if (( native_abi_status != 0 )); then
            printf '%s\n' "$native_abi_output" >&2
            exit "$native_abi_status"
          fi
          native_abi="$(
            printf '%s\n' "$native_abi_output" \
              | awk '/^[0-9a-f]{40}$/ { value = $0 } END { if (value != "") print value }'
          )"
          if [[ "${#native_abi}" -ne 40 ]]; then
            printf '%s\n' "$native_abi_output" >&2
            exit 1
          fi
          echo "GERBIL_NATIVE_ABI=$native_abi" >> "$GITHUB_ENV"
          echo "fingerprint=$native_abi" >> "$GITHUB_OUTPUT"
          echo "Gerbil native ABI: $native_abi"

      - name: Install Gerbil project dependencies
        timeout-minutes: ${{ matrix.dependency-timeout-minutes }}
        run: bazel run @local_gerbil//:install_dependencies

      - name: Build declared Gerbil dependency projects
        timeout-minutes: ${{ matrix.dependency-timeout-minutes }}
        run: bazel build //scheme:dependency_packages

      - name: Validate shared Gerbil provider
        run: bazel test --test_output=errors //tools/bazel:shared_gerbil_capability_test

      - name: Validate Bazel target graph
        run: bazel query //...

      - name: Build Scheme package through Bazel
        id: scheme-compile
        timeout-minutes: 8
        env:
          COMPILE_BUDGET_SECONDS: 480
        shell: bash
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/bazel-scheme-compile-profile.gz"
          ci_receipt="$RUNNER_TEMP/bazel-scheme-compile-ci-receipt.json"
          start_seconds=$SECONDS

          set +e
          bazel build --profile="$profile" //scheme:compile
          build_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          scheme_receipt="bazel-bin/scheme/compile.receipt.json"
          jq -n \
            --arg schema "poo-flow.ci.bazel-phase-receipt.v1" \
            --arg phase "scheme-compile" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --argjson status "$build_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$COMPILE_BUDGET_SECONDS" \
            --argjson schemeReceiptAvailable "$([[ -f "$scheme_receipt" ]] && printf true || printf false)" \
            '{schema: $schema, phase: $phase, runner: $runner, status: $status,
              elapsedSeconds: $elapsedSeconds, budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds),
              schemeReceiptAvailable: $schemeReceiptAvailable}' > "$ci_receipt"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "ci-receipt=$ci_receipt" >> "$GITHUB_OUTPUT"

          if (( build_status != 0 )); then
            exit "$build_status"
          fi
          if (( elapsed_seconds > COMPILE_BUDGET_SECONDS )); then
            echo "Scheme compile exceeded ${COMPILE_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi

      - name: Validate stable Scheme project receipt v1
        timeout-minutes: 2
        run: bazel test --test_output=errors //scheme:compile_receipt_v1_test

      - name: Upload Scheme compile evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bazel-scheme-compile-evidence-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ steps.scheme-compile.outputs.ci-receipt }}
            ${{ steps.scheme-compile.outputs.profile }}
            bazel-bin/scheme/compile.receipt.json
            bazel-bin/scheme/compile.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build Python wheel Scheme projection through Bazel
        if: runner.os == 'Linux'
        id: wheel-scheme-projection
        timeout-minutes: 2
        env:
          PROJECTION_ARTIFACT: bazel-bin/scheme/wheel_smoke.ss.poo-flow-projection.sexp
          PROJECTION_BUDGET_SECONDS: 120
        shell: bash
        run: |
          set -euo pipefail
          handoff_dir="$GITHUB_WORKSPACE/.ci/python-wheel-projection"
          profile="$RUNNER_TEMP/python-wheel-scheme-projection-profile.gz"
          receipt="$handoff_dir/producer-receipt.json"
          start_seconds=$SECONDS
          mkdir -p "$handoff_dir"

          set +e
          bazel build \
            --profile="$profile" \
            //scheme:wheel_smoke_projection_artifact
          build_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          artifact_available=false
          artifact_digest=""
          if [[ -s "$PROJECTION_ARTIFACT" ]]; then
            artifact_available=true
            artifact_digest="$(sha256sum "$PROJECTION_ARTIFACT" | awk '{print $1}')"
            cp "$PROJECTION_ARTIFACT" "$handoff_dir/"
          fi
          jq -n \
            --arg schema "poo-flow.ci.scheme-projection-handoff.v1" \
          --arg producerJob "native-linux" \
          --arg action "//scheme:wheel_smoke_projection_artifact" \
          --arg compileOwner "//scheme:compile" \
          --arg currentHeadSha "$GITHUB_SHA" \
          --arg artifactDigest "$artifact_digest" \
            --argjson status "$build_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$PROJECTION_BUDGET_SECONDS" \
            --argjson artifactAvailable "$artifact_available" \
          '{schema: $schema, producerJob: $producerJob, action: $action,
            compileOwner: $compileOwner, currentHeadSha: $currentHeadSha,
            artifactDigest: $artifactDigest,
            status: $status, elapsedSeconds: $elapsedSeconds,
              budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds),
              artifactAvailable: $artifactAvailable}' > "$receipt"

          if (( build_status != 0 )); then
            exit "$build_status"
          fi
          if (( elapsed_seconds > PROJECTION_BUDGET_SECONDS )); then
            echo "Scheme projection exceeded ${PROJECTION_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi
          test -s "$PROJECTION_ARTIFACT"

      - name: Upload Python wheel Scheme projection handoff
        if: ${{ always() && runner.os == 'Linux' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-wheel-scheme-projection-producer
          path: .ci/python-wheel-projection
          if-no-files-found: warn
          retention-days: 7

      - name: Build runtime-C producer artifacts through Bazel
        if: runner.os == 'Linux'
        id: runtime-c-producer
        timeout-minutes: 2
        env:
          RUNTIME_C_BUILD_BUDGET_SECONDS: 90
        shell: bash
        run: |
          set -euo pipefail
          handoff_dir="$GITHUB_WORKSPACE/.ci/runtime-c"
          profile="$RUNNER_TEMP/bazel-runtime-c-producer-profile.gz"
          start_seconds=$SECONDS
          mkdir -p "$handoff_dir"

          set +e
          bazel build --profile="$profile" \
            //bindings/runtime-c:runtime_c_static \
            //bindings/runtime-c:runtime_c_shared
          build_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          echo "elapsed-seconds=$elapsed_seconds" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          if (( build_status != 0 )); then
            exit "$build_status"
          fi
          if (( elapsed_seconds > RUNTIME_C_BUILD_BUDGET_SECONDS )); then
            echo "runtime-C producer build exceeded ${RUNTIME_C_BUILD_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi

          library="$GITHUB_WORKSPACE/bazel-bin/bindings/runtime-c/libruntime_c_shared.so"
          test -s "$library"
          cp "$library" "$handoff_dir/libpoo_flow_runtime_v0.so"

      - name: Run Bazel acceptance suites
        id: bazel-acceptance
        timeout-minutes: 3
        env:
          ACCEPTANCE_BUDGET_SECONDS: 150
        shell: bash
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/bazel-acceptance-profile.gz"
          receipt="$RUNNER_TEMP/bazel-acceptance-ci-receipt.json"
          start_seconds=$SECONDS

          targets=(
            //scheme:tests
            //tools/bazel:shared_gerbil_capability_test
            //bindings/runtime-c:runtime_c_tests
            //bindings/runtime-c/bundle-v1:bundle_v1_tests
          )
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            targets+=(
              //bindings/runtime-c:runtime_c_sanitizer_tests
              //bindings/runtime-c:runtime_c_leak_test
              //bindings/runtime-c:runtime_v0_batch_benchmark_smoke
              //bindings/runtime-c:runtime_v0_gerbil_ffi_benchmark
            )
          fi

          set +e
          bazel test --profile="$profile" "${targets[@]}"
          test_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          jq -n \
            --arg schema "poo-flow.ci.bazel-phase-receipt.v1" \
            --arg phase "acceptance" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --argjson status "$test_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$ACCEPTANCE_BUDGET_SECONDS" \
            '{schema: $schema, phase: $phase, runner: $runner, status: $status,
              elapsedSeconds: $elapsedSeconds, budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds)}' > "$receipt"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "receipt=$receipt" >> "$GITHUB_OUTPUT"

          if (( test_status != 0 )); then
            exit "$test_status"
          fi
          if (( elapsed_seconds > ACCEPTANCE_BUDGET_SECONDS )); then
            echo "Bazel acceptance exceeded ${ACCEPTANCE_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi

      - name: Reject stale runtime-C Make routes
        if: runner.os == 'Linux'
        run: tools/ci/check-runtime-c-build-boundary

      - name: Finalize runtime-C producer handoff
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          handoff_dir="$GITHUB_WORKSPACE/.ci/runtime-c"
          library="$handoff_dir/libpoo_flow_runtime_v0.so"
          acceptance_receipt="${{ steps.bazel-acceptance.outputs.receipt }}"
          producer_receipt="$handoff_dir/producer-receipt.json"
          test -s "$library"
          test -s "$acceptance_receipt"
          jq -e '.status == 0 and .withinBudget == true' \
            "$acceptance_receipt" >/dev/null
          cp "$acceptance_receipt" "$handoff_dir/acceptance-receipt.json"

          artifact_digest="$(sha256sum "$library" | awk '{print $1}')"
          symbols_digest="$(
            nm -D --defined-only "$library" \
              | awk '{print $3}' \
              | sed '/^$/d' \
              | LC_ALL=C sort -u \
              | sha256sum \
              | awk '{print $1}'
          )"
          symbol_count="$(
            nm -D --defined-only "$library" \
              | awk '{print $3}' \
              | sed '/^$/d' \
              | LC_ALL=C sort -u \
              | wc -l \
              | tr -d ' '
          )"
          artifact_bytes="$(stat -c %s "$library")"
          acceptance_digest="$(sha256sum "$acceptance_receipt" | awk '{print $1}')"

          jq -n \
            --arg schema "poo-flow.ci.runtime-c-handoff.v1" \
            --arg producerJob "native-linux" \
            --arg producerTarget "//bindings/runtime-c:runtime_c_shared" \
            --arg platform "${RUNNER_OS}-${RUNNER_ARCH}" \
            --arg currentHeadSha "$GITHUB_SHA" \
            --arg gerbilNativeAbi "$GERBIL_NATIVE_ABI" \
            --arg artifactPath "libpoo_flow_runtime_v0.so" \
            --arg artifactDigest "$artifact_digest" \
            --arg exportedSymbolsDigest "$symbols_digest" \
            --arg acceptanceReceiptDigest "$acceptance_digest" \
            --argjson artifactBytes "$artifact_bytes" \
            --argjson exportedSymbolCount "$symbol_count" \
            --argjson elapsedSeconds "${{ steps.runtime-c-producer.outputs.elapsed-seconds }}" \
            --argjson budgetSeconds 90 \
            '{schema: $schema, producerJob: $producerJob,
              producerTarget: $producerTarget,
              platform: $platform, currentHeadSha: $currentHeadSha,
              gerbilNativeAbi: $gerbilNativeAbi, artifactPath: $artifactPath,
              artifactDigest: $artifactDigest,
              exportedSymbolsDigest: $exportedSymbolsDigest,
              exportedSymbolCount: $exportedSymbolCount,
              artifactBytes: $artifactBytes,
              acceptanceReceiptDigest: $acceptanceReceiptDigest,
              elapsedSeconds: $elapsedSeconds, budgetSeconds: $budgetSeconds,
              artifactAvailable: true, status: 0,
              withinBudget: ($elapsedSeconds <= $budgetSeconds)}' \
            > "$producer_receipt"

      - name: Upload Bazel acceptance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bazel-acceptance-evidence-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ steps.bazel-acceptance.outputs.receipt }}
            ${{ steps.bazel-acceptance.outputs.profile }}
            ${{ steps.runtime-c-producer.outputs.profile }}
            .ci/runtime-c/producer-receipt.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload runtime-C producer handoff
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: poo-flow-runtime-native-library
          path: .ci/runtime-c
          if-no-files-found: error
          retention-days: 7

  native-macos:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.refresh_lock }}
    name: POO Flow Gerbil package (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.job-timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            gerbil-label: homebrew-tao3k-v0.18.2-07c84815
            gerbil-install: homebrew
            gerbil-formula: tao3k/gerbil/gerbil-scheme
            dependency-timeout-minutes: 12
            external-module-mode: analysis
            job-timeout-minutes: 30
    steps: *native-steps

  python-runtime-wheel:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.refresh_lock }}
    name: Python runtime wheel
    needs: native-linux
    uses: ./.github/workflows/python-runtime-wheel.yml

  lock-linux-seed:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_lock }}
    name: Lock refresh (linux-amd64 seed)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true

      - name: Generate the Linux module-extension evaluation
        run: |
          bazelisk mod deps --config=lock_update
          bazelisk mod deps --lockfile_mode=error

      - name: Upload the Linux lock seed
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: poo-flow-module-lock-linux-${{ github.run_id }}-${{ github.run_attempt }}
          path: MODULE.bazel.lock
          if-no-files-found: error

  lock-darwin-merge:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_lock }}
    name: Lock refresh (darwin-arm64 merge)
    needs: lock-linux-seed
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download the Linux lock seed
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: poo-flow-module-lock-linux-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci/lock-linux

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true

      - name: Merge the Darwin module-extension evaluation
        run: |
          cp .ci/lock-linux/MODULE.bazel.lock MODULE.bazel.lock
          bazelisk mod deps --config=lock_update
          bazelisk mod deps --lockfile_mode=error

      - name: Upload the merged cross-platform lock
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: poo-flow-module-lock-${{ github.run_id }}-${{ github.run_attempt }}
          path: MODULE.bazel.lock
          if-no-files-found: error

  lock-linux-verify:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_lock }}
    name: Lock verify (linux-amd64 merged)
    needs: lock-darwin-merge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download the merged cross-platform lock
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: poo-flow-module-lock-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci/lock-merged

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          cache-save: false
          repository-cache: true

      - name: Verify the merged lock on Linux
        run: |
          cp .ci/lock-merged/MODULE.bazel.lock MODULE.bazel.lock
          bazelisk mod deps --lockfile_mode=error
