name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lean-proof:
    name: POO Flow Lean proof bridge
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Restore Lean cache
        id: lean-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.elan
            packages/proof/lean/.lake
          key: lean-proof-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/proof/lean/lean-toolchain', 'packages/proof/lean/lakefile.lean', 'packages/proof/lean/lake-manifest.json') }}
          restore-keys: |
            lean-proof-${{ runner.os }}-${{ runner.arch }}-

      - name: Install elan
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/lake" ]; then
            curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          cd packages/proof/lean
          "$HOME/.elan/bin/lake" --version

      - name: Build Lean proof bridge
        working-directory: packages/proof/lean
        shell: bash
        run: |
          set -euo pipefail
          lake build
          lake build ffiSmoke
          .lake/build/bin/ffiSmoke

      - name: Save Lean cache
        if: steps.lean-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.elan
            packages/proof/lean/.lake
          key: lean-proof-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/proof/lean/lean-toolchain', 'packages/proof/lean/lakefile.lean', 'packages/proof/lean/lake-manifest.json') }}

  native:
    name: POO Flow Gerbil package (${{ matrix.os }}, ${{ matrix.gerbil-label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.gerbil-install == 'homebrew' && 12 || 60 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: source-v0.18.2-07c84815
            gerbil-ref: 07c8481588a8b07dbf05832687817cd398902ac0
            gerbil-install: source
            gerbil-formula: ""
          - os: macos-26
            gerbil-label: homebrew-tao3k-v0.18.2-07c84815
            gerbil-ref: 07c8481588a8b07dbf05832687817cd398902ac0
            gerbil-install: homebrew
            gerbil-formula: tao3k/gerbil/gerbil-scheme
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ci/ccache
      CCACHE_MAXSIZE: 2G
      GERBIL_ARCH_PROFILE: portable
      GERBIL_REQUIRE_CCACHE: 1
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            ccache \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v3
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install ccache jq openssl pkg-config sqlite zlib

      - name: Install macOS Gerbil bottle
        if: runner.os == 'macOS' && matrix.gerbil-install == 'homebrew'
        id: homebrew-gerbil-install
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_BOTTLE_SOURCE_FALLBACK: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
          INSTALL_BUDGET_SECONDS: 120
        shell: bash
        run: |
          set -euo pipefail
          formula="${{ matrix.gerbil-formula }}"
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          start_seconds=$SECONDS

          set +e
          brew install --force-bottle "$formula"
          install_status=$?
          set -e

          install_seconds=$((SECONDS - start_seconds))
          info_status=1
          poured_from_bottle=false
          if (( install_status == 0 )); then
            set +e
            formula_info="$(brew info --json=v2 "$formula" 2>/dev/null)"
            info_status=$?
            set -e
            if (( info_status == 0 )); then
              poured_from_bottle="$(jq -r '.formulae[0].installed[-1].poured_from_bottle // false' <<< "$formula_info")"
            fi
          fi

          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          receipt="$RUNNER_TEMP/poo-flow-homebrew-gerbil-receipt.json"
          jq -n \
            --arg schema "poo-flow.ci.homebrew-gerbil-receipt.v1" \
            --arg formula "$formula" \
            --arg currentHeadSha "$GITHUB_SHA" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --arg startedAt "$started_at" \
            --arg completedAt "$completed_at" \
            --argjson pouredFromBottle "$poured_from_bottle" \
            --argjson installSeconds "$install_seconds" \
            --argjson installBudgetSeconds "$INSTALL_BUDGET_SECONDS" \
            --argjson installStatus "$install_status" \
            --argjson infoStatus "$info_status" \
            '{schema: $schema, formula: $formula, currentHeadSha: $currentHeadSha,
              runner: $runner, pouredFromBottle: $pouredFromBottle,
              startedAt: $startedAt, completedAt: $completedAt,
              installSeconds: $installSeconds,
              installBudgetSeconds: $installBudgetSeconds,
              installStatus: $installStatus, infoStatus: $infoStatus}' > "$receipt"
          echo "receipt=$receipt" >> "$GITHUB_OUTPUT"

          if (( install_status != 0 )); then
            exit "$install_status"
          fi
          if (( install_seconds > INSTALL_BUDGET_SECONDS )); then
            echo "Gerbil bottle install exceeded ${INSTALL_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi
          if (( info_status != 0 )) || [[ "$poured_from_bottle" != "true" ]]; then
            echo "Gerbil formula did not consume a published bottle" >&2
            exit 1
          fi

      - name: Upload macOS Gerbil install receipt
        if: always() && runner.os == 'macOS' && matrix.gerbil-install == 'homebrew'
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-gerbil-install-receipt-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.homebrew-gerbil-install.outputs.receipt }}
          if-no-files-found: warn
          retention-days: 7

      - name: Select macOS Gerbil compiler
        if: runner.os == 'macOS' && matrix.gerbil-install == 'source'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          gcc_bin="$(
            find "$gcc_prefix/bin" -maxdepth 1 -type f -name 'gcc-[0-9]*' \
              | awk -F- '{print $NF "\t" $0}' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          test -n "$gcc_bin"
          test -x "$gcc_bin"
          echo "GERBIL_GCC=$gcc_bin" >> "$GITHUB_ENV"
          "$gcc_bin" --version

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-v3

      - name: Resolve native Gerbil ABI capability
        id: gerbil-native-abi
        shell: bash
        run: |
          set -euo pipefail
          native_abi="$(bash tools/bazel/native_abi_fingerprint.sh "${GERBIL_GCC:-}" "$GERBIL_ARCH_PROFILE")"
          echo "GERBIL_NATIVE_ABI=$native_abi" >> "$GITHUB_ENV"
          echo "fingerprint=$native_abi" >> "$GITHUB_OUTPUT"
          echo "Gerbil native ABI: $native_abi"

      - name: Restore Gerbil bootstrap ccache
        id: gerbil-ccache-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/ccache
          key: gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-
            ccache-python-runtime-wheel-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-

      - name: Declare Bazel disk-cache generation
        shell: bash
        env:
          POO_FLOW_BAZEL_CACHE_GENERATION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ci/bazel-cache-generation
          printf '# POO Flow CI cache generation: %s\n' \
            "$POO_FLOW_BAZEL_CACHE_GENERATION" \
            > .ci/bazel-cache-generation/BUILD.bazel

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # setup-bazel hashes BUILD files and restores the newest matching
          # prefix when the exact generation is absent.  The ignored synthetic
          # BUILD file above advances that generation on every commit, so an
          # updated action cache is published instead of being trapped behind
          # GitHub's immutable exact key.  Forks remain restore-only.
          cache-save: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          disk-cache: ci-${{ runner.os }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}
          repository-cache: true

      - name: Restore Gerbil install cache
        if: matrix.gerbil-install == 'source'
        id: gerbil-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}

      - name: Build Gerbil
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        run: |
          if [ -n "${GERBIL_GCC:-}" ]; then
            export CC="$GERBIL_GCC"
          fi
          bash tools/bazel/bootstrap_gerbil_toolchain.sh

      - name: Show Gerbil bootstrap ccache stats
        if: ${{ always() && matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true' }}
        run: ccache --show-stats

      - name: Save Gerbil bootstrap ccache
        if: ${{ always() && matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/ccache
          key: gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Gerbil bootstrap phase receipt
        if: always() && matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gerbil-bootstrap-receipt-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}
          path: .ci/gerbil-src/${{ matrix.gerbil-label }}/.poo-flow-bootstrap-state.json
          if-no-files-found: warn
          retention-days: 7

      - name: Save Gerbil install cache
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/gerbil/${{ matrix.gerbil-label }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}

      - name: Use Homebrew Gerbil
        if: matrix.gerbil-install == 'homebrew'
        run: |
          set -euo pipefail
          formula="${{ matrix.gerbil-formula }}"
          prefix="$(brew --prefix "$formula")"
          gerbil_home="$prefix/current"
          echo "GERBIL_PREFIX=$gerbil_home" >> "$GITHUB_ENV"
          echo "GERBIL_HOME=$gerbil_home" >> "$GITHUB_ENV"
          test -x "$gerbil_home/bin/gxi"
          test -x "$gerbil_home/bin/gsc"
          test -e "$gerbil_home/lib"
          "$gerbil_home/bin/gxi" --version | tee /tmp/gerbil-version.txt
          "$gerbil_home/bin/gsc" -v | tee /tmp/gambit-version.txt
          grep -F "v0.18.2" /tmp/gerbil-version.txt
          grep -F "v4.9.7" /tmp/gambit-version.txt
          echo "$gerbil_home/bin" >> "$GITHUB_PATH"

      - name: Activate Gerbil
        run: |
          set -euo pipefail
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          gsc_wrapper="$RUNNER_TEMP/gerbil-gsc"
          {
            printf '#!/bin/sh\n'
            printf 'exec "%s" "-:~~=%s,~~bin=%s,~~include=%s,~~lib=%s" "$@"\n' "$GERBIL_PREFIX/bin/gsc" "$GERBIL_PREFIX" "$GERBIL_PREFIX/bin" "$GERBIL_PREFIX/include" "$GERBIL_PREFIX/lib"
          } > "$gsc_wrapper"
          chmod +x "$gsc_wrapper"
          echo "GERBIL_GSC=$gsc_wrapper" >> "$GITHUB_ENV"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" help >/dev/null
          "$gsc_wrapper" -v
          tmp_smoke="$(mktemp -d)"
          printf '(display "ok")\n' > "$tmp_smoke/gsc-smoke.scm"
          "$gsc_wrapper" -target C "$tmp_smoke/gsc-smoke.scm"
          test -f "$tmp_smoke/gsc-smoke.o1"
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'
          "$GERBIL_PREFIX/bin/gxpkg" list

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg', 'manifest.ss') }}

      - name: Install Gerbil package dependencies from gerbil.pkg
        run: |
          set -euo pipefail
          package_cache_ready=false
          if [ -d .gerbil/lib ]; then
            if GERBIL_PATH="$GITHUB_WORKSPACE/.gerbil" \
              gxi tools/ci/gerbil-deps-ready.ss; then
              package_cache_ready=true
            else
              echo "Cached Gerbil packages are missing compiled dependency libraries; rebuilding"
            fi
          fi
          if [ "$package_cache_ready" = "true" ]; then
            echo "Using cached Gerbil package dependency build products"
          else
            bazel run //scheme:deps
          fi
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.gerbil-label }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ matrix.gerbil-ref }}-${{ hashFiles('gerbil.pkg', 'manifest.ss') }}

      - name: Validate Bazel target graph
        run: bazel query //...

      - name: Build Scheme package through Bazel
        id: scheme-compile
        timeout-minutes: 8
        env:
          COMPILE_BUDGET_SECONDS: 480
        shell: bash
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/bazel-scheme-compile-profile.gz"
          ci_receipt="$RUNNER_TEMP/bazel-scheme-compile-ci-receipt.json"
          start_seconds=$SECONDS

          set +e
          bazel build --profile="$profile" //scheme:compile
          build_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          scheme_receipt="bazel-bin/scheme/compile.receipt.json"
          jq -n \
            --arg schema "poo-flow.ci.bazel-phase-receipt.v1" \
            --arg phase "scheme-compile" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --argjson status "$build_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$COMPILE_BUDGET_SECONDS" \
            --argjson schemeReceiptAvailable "$([[ -f "$scheme_receipt" ]] && printf true || printf false)" \
            '{schema: $schema, phase: $phase, runner: $runner, status: $status,
              elapsedSeconds: $elapsedSeconds, budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds),
              schemeReceiptAvailable: $schemeReceiptAvailable}' > "$ci_receipt"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "ci-receipt=$ci_receipt" >> "$GITHUB_OUTPUT"

          if (( build_status != 0 )); then
            exit "$build_status"
          fi
          if (( elapsed_seconds > COMPILE_BUDGET_SECONDS )); then
            echo "Scheme compile exceeded ${COMPILE_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi

      - name: Upload Scheme compile evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-scheme-compile-evidence-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ steps.scheme-compile.outputs.ci-receipt }}
            ${{ steps.scheme-compile.outputs.profile }}
            bazel-bin/scheme/compile.receipt.json
            bazel-bin/scheme/compile.log
          if-no-files-found: warn
          retention-days: 7

      - name: Run Bazel acceptance suites
        id: bazel-acceptance
        timeout-minutes: 3
        env:
          ACCEPTANCE_BUDGET_SECONDS: 150
        shell: bash
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/bazel-acceptance-profile.gz"
          receipt="$RUNNER_TEMP/bazel-acceptance-ci-receipt.json"
          start_seconds=$SECONDS

          set +e
          bazel test --profile="$profile" \
            //scheme:tests \
            //bindings/runtime-c:runtime_c_tests \
            //bindings/runtime-c/bundle-v1:bundle_v1_tests
          test_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          jq -n \
            --arg schema "poo-flow.ci.bazel-phase-receipt.v1" \
            --arg phase "acceptance" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --argjson status "$test_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$ACCEPTANCE_BUDGET_SECONDS" \
            '{schema: $schema, phase: $phase, runner: $runner, status: $status,
              elapsedSeconds: $elapsedSeconds, budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds)}' > "$receipt"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "receipt=$receipt" >> "$GITHUB_OUTPUT"

          if (( test_status != 0 )); then
            exit "$test_status"
          fi
          if (( elapsed_seconds > ACCEPTANCE_BUDGET_SECONDS )); then
            echo "Bazel acceptance exceeded ${ACCEPTANCE_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi

      - name: Upload Bazel acceptance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-acceptance-evidence-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ steps.bazel-acceptance.outputs.receipt }}
            ${{ steps.bazel-acceptance.outputs.profile }}
          if-no-files-found: warn
          retention-days: 7

  python-runtime-wheel:
    name: Python runtime wheel
    needs: native
    uses: ./.github/workflows/python-runtime-wheel.yml
