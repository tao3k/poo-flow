name: Release poo-flow binary

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish assets to"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: source-v0.18.2-07c84815
            gerbil-ref: 07c8481588a8b07dbf05832687817cd398902ac0
            gerbil-install: source
            gerbil-formula: ""
          - os: macos-latest
            gerbil-label: homebrew-tao3k-v0.18.2-07c84815
            gerbil-ref: 07c8481588a8b07dbf05832687817cd398902ac0
            gerbil-install: homebrew
            gerbil-formula: tao3k/gerbil/gerbil-scheme
    env:
      BINARY: poo-flow
      CCACHE_DIR: ${{ github.workspace }}/.ci/ccache
      CCACHE_MAXSIZE: 2G
      GERBIL_ARCH_PROFILE: portable
      GERBIL_LABEL: ${{ matrix.gerbil-label }}
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_REQUIRE_CCACHE: 1
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Ensure release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release tag must start with v: $RELEASE_TAG" >&2; exit 2 ;;
          esac
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            ccache \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-v3
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install jq openssl pkg-config sqlite zlib "${{ matrix.gerbil-formula }}"

      - name: Select macOS Gerbil compiler
        if: runner.os == 'macOS' && matrix.gerbil-install == 'source'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          gcc_bin="$(
            find "$gcc_prefix/bin" -maxdepth 1 -type f -name 'gcc-[0-9]*' \
              | awk -F- '{print $NF "\t" $0}' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          test -n "$gcc_bin"
          test -x "$gcc_bin"
          echo "GERBIL_GCC=$gcc_bin" >> "$GITHUB_ENV"
          "$gcc_bin" --version

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-v3

      - name: Restore Gerbil install cache
        if: matrix.gerbil-install == 'source'
        id: gerbil-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/gerbil/${{ env.GERBIL_LABEL }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}
          restore-keys: |
            gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-

      - name: Build Gerbil
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        run: bash tools/bazel/bootstrap_gerbil_toolchain.sh

      - name: Save Gerbil install cache
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/gerbil/${{ env.GERBIL_LABEL }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}

      - name: Use Homebrew Gerbil
        if: matrix.gerbil-install == 'homebrew'
        run: |
          set -euo pipefail
          formula="${{ matrix.gerbil-formula }}"
          prefix="$(brew --prefix "$formula")"
          gerbil_home="$prefix/current"
          echo "GERBIL_PREFIX=$gerbil_home" >> "$GITHUB_ENV"
          echo "GERBIL_HOME=$gerbil_home" >> "$GITHUB_ENV"
          test -x "$gerbil_home/bin/gxi"
          test -x "$gerbil_home/bin/gsc"
          test -e "$gerbil_home/lib"
          "$gerbil_home/bin/gxi" --version | tee /tmp/gerbil-version.txt
          "$gerbil_home/bin/gsc" -v | tee /tmp/gambit-version.txt
          grep -F "v0.18.2" /tmp/gerbil-version.txt
          grep -F "v4.9.7" /tmp/gambit-version.txt

      - name: Activate Gerbil
        run: |
          set -euo pipefail
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          gsc_wrapper="$RUNNER_TEMP/gerbil-gsc"
          {
            printf '#!/bin/sh\n'
            printf 'exec "%s" "-:~~=%s,~~bin=%s,~~include=%s,~~lib=%s" "$@"\n' "$GERBIL_PREFIX/bin/gsc" "$GERBIL_PREFIX" "$GERBIL_PREFIX/bin" "$GERBIL_PREFIX/include" "$GERBIL_PREFIX/lib"
          } > "$gsc_wrapper"
          chmod +x "$gsc_wrapper"
          echo "GERBIL_GSC=$gsc_wrapper" >> "$GITHUB_ENV"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" help >/dev/null
          "$gsc_wrapper" -v
          tmp_smoke="$(mktemp -d)"
          printf '(display "ok")\n' > "$tmp_smoke/gsc-smoke.scm"
          "$gsc_wrapper" -target C "$tmp_smoke/gsc-smoke.scm"
          test -f "$tmp_smoke/gsc-smoke.o1"
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-v3-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}-${{ hashFiles('gerbil.pkg') }}
          restore-keys: |
            gerbil-pkg-v3-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}-

      - name: Install Gerbil package dependencies from gerbil.pkg
        env:
          GERBIL_PKG_CACHE_HIT: ${{ steps.gerbil-pkg-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          reset_stale_package_cache() {
            :
            rm -rf \
              "$HOME/.gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-poo" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-utils" \
              ".gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-poo" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-utils" \
              ".gerbil/src/github.com/tao3k/gerbil-scheme-language-project-harness" \
              ".gerbil/src/github.com/mighty-gerbils/gerbil-poo" \
              ".gerbil/src/github.com/mighty-gerbils/gerbil-utils"
            rm -f \
              "$HOME/.gerbil/pkg/manifest.ss" \
              "$HOME/.gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness.manifest" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-poo.manifest" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-utils.manifest" \
              ".gerbil/pkg/manifest.ss" \
              ".gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness.manifest" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-poo.manifest" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-utils.manifest"
            gxpkg retag >/dev/null 2>&1 || true
          }
          link_package() {
            local pkg="$1"
            local repo="$2"
            local ref="${3:-}"
            local src=".gerbil/src/$pkg"
            mkdir -p "$(dirname "$src")"
            git clone "$repo" "$src"
            if [ -n "$ref" ]; then
              git -C "$src" checkout "$ref"
            fi
            gxpkg link "$pkg" "$src"
          }
          build_package() {
            gxpkg build "$1"
          }
          install_gerbil_package_dependencies() {
            link_package \
              github.com/mighty-gerbils/gerbil-utils \
              https://github.com/mighty-gerbils/gerbil-utils.git \
              f45a4ef3bfecd2af39e114ed736ce9082cbb8244
            build_package github.com/mighty-gerbils/gerbil-utils
            link_package \
              github.com/mighty-gerbils/gerbil-poo \
              https://github.com/mighty-gerbils/gerbil-poo.git \
              1c3225637525400341a09e958296962c10184ead
            build_package github.com/mighty-gerbils/gerbil-poo
            link_package \
              github.com/tao3k/gerbil-scheme-language-project-harness \
              https://github.com/tao3k/gerbil-scheme-language-project-harness.git \
              16036d84bb4d9ec29bd14c7426eec2f8ceac8223
            build_package github.com/tao3k/gerbil-scheme-language-project-harness
          }
          mkdir -p "$HOME/.gerbil/pkg"
          if [ "$GERBIL_PKG_CACHE_HIT" = "true" ]; then
            echo "Using cached Gerbil package dependencies"
          else
            reset_stale_package_cache
            install_gerbil_package_dependencies
          fi
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-v3-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}-${{ hashFiles('gerbil.pkg') }}

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail
          gxpkg env ./build.ss compile --release --optimized
          test -x .gerbil/bin/poo-flow
          .gerbil/bin/poo-flow --help >/tmp/poo-flow-help.txt
          test -s /tmp/poo-flow-help.txt

      - name: Package provider binary
        shell: bash
        run: |
          set -euo pipefail
          target="$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m)"
          rm -rf package
          mkdir -p package/bin package/src
          cp .gerbil/bin/poo-flow package/bin/poo-flow
          cp -R src/. package/src/
          cp build.ss gerbil.pkg package/
          chmod +x "package/bin/${BINARY}"
          asset="${BINARY}-${target}.tar.gz"
          echo "ASSET=$asset" >> "$GITHUB_ENV"
          tar -czf "$asset" -C package .
          python3 - "$asset" <<'PY'
          import hashlib
          import pathlib
          import sys

          asset = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          pathlib.Path(f"{asset}.sha256").write_text(f"{digest}  {asset.name}\n")
          PY

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --notes "POO Flow binary release $RELEASE_TAG" \
            || gh release view "$RELEASE_TAG" >/dev/null
          gh release upload "$RELEASE_TAG" "$ASSET" "${ASSET}.sha256" --clobber
