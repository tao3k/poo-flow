name: Release poo-flow binary

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish assets to"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gerbil-label: source-v0.18.2-4-gadd92248
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
            gerbil-install: source
          - os: macos-latest
            gerbil-label: homebrew-v0.18.2
            gerbil-ref: add922481cec81d05431db014bcb91b30485cf21
            gerbil-install: homebrew
    env:
      BINARY: poo-flow
      GERBIL_LABEL: ${{ matrix.gerbil-label }}
      GERBIL_REF: ${{ matrix.gerbil-ref }}
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/${{ matrix.gerbil-label }}
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/${{ matrix.gerbil-label }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v4

      - name: Ensure release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release tag must start with v: $RELEASE_TAG" >&2; exit 2 ;;
          esac
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            zlib1g-dev

      - name: Restore Homebrew cache
        if: runner.os == 'macOS'
        id: homebrew-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-v2
          restore-keys: |
            homebrew-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install gambit-scheme
          brew unlink gambit-scheme || true
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install gerbil-scheme jq openssl pkg-config sqlite zlib
          brew link --overwrite gerbil-scheme

      - name: Select macOS Gerbil compiler
        if: runner.os == 'macOS' && matrix.gerbil-install == 'source'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          gcc_bin="$(
            find "$gcc_prefix/bin" -maxdepth 1 -type f -name 'gcc-[0-9]*' \
              | awk -F- '{print $NF "\t" $0}' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          test -n "$gcc_bin"
          test -x "$gcc_bin"
          echo "GERBIL_GCC=$gcc_bin" >> "$GITHUB_ENV"
          "$gcc_bin" --version

      - name: Save Homebrew cache
        if: runner.os == 'macOS' && steps.homebrew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-v1

      - name: Restore Gerbil install cache
        if: matrix.gerbil-install == 'source'
        id: gerbil-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/gerbil/${{ env.GERBIL_LABEL }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}
          restore-keys: |
            gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-

      - name: Build Gerbil
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        run: |
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          mkdir -p "$(dirname "$GERBIL_SRC")" "$(dirname "$GERBIL_PREFIX")"
          rm -rf "$GERBIL_SRC" "$GERBIL_PREFIX"
          git clone https://git.cons.io/mighty-gerbils/gerbil "$GERBIL_SRC"
          cd "$GERBIL_SRC"
          git checkout "$GERBIL_REF"
          ./configure --prefix="$GERBIL_PREFIX"
          echo "(def (gerbil-version-string) \"ci-${GERBIL_REF}\")" > src/gerbil/runtime/version.ss
          . ./build-env.sh
          for target in prepare gambit boot-gxi stage0 stage1 stdlib libgerbil lang r7rs-large srfi tools; do
            GERBIL_BUILD_CORES="$(build_cores)" ./src/build.sh "$target"
          done
          ./install.sh

      - name: Save Gerbil install cache
        if: matrix.gerbil-install == 'source' && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/gerbil/${{ env.GERBIL_LABEL }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}

      - name: Use Homebrew Gerbil
        if: matrix.gerbil-install == 'homebrew'
        run: |
          set -euo pipefail
          prefix="$(brew --prefix gerbil-scheme)"
          echo "GERBIL_PREFIX=$prefix" >> "$GITHUB_ENV"
          "$prefix/bin/gxi" --version | tee /tmp/gerbil-version.txt
          grep -F "v0.18.2" /tmp/gerbil-version.txt

      - name: Activate Gerbil
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            gerbil_real_prefix="$(cd "$GERBIL_PREFIX" && pwd -P)"
            gsc_path="$GERBIL_PREFIX/bin/gsc"
            runtime_prefixes="$gerbil_real_prefix/v0.18.2"
            if [ -x "$gsc_path" ]; then
              gsc_real_path="$(python3 -c 'import os, sys; print(os.path.realpath(sys.argv[1]))' "$gsc_path")"
              gsc_runtime_prefix="$(cd "$(dirname "$gsc_real_path")/.." && pwd -P)"
              runtime_prefixes="$gsc_runtime_prefix $runtime_prefixes"
              mkdir -p "$gerbil_real_prefix/v0.18.2/bin"
              ln -sf "$gsc_path" "$gerbil_real_prefix/v0.18.2/bin/gsc"
            fi
            gambit_prefix="$(brew --prefix gambit-scheme 2>/dev/null || true)"
            gambit_cellar="$(brew --cellar gambit-scheme 2>/dev/null || true)"
            gambit_cellar_prefix=""
            if [ -n "$gambit_cellar" ] && [ -d "$gambit_cellar" ]; then
              gambit_cellar_prefix="$(find "$gambit_cellar" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
            fi

            link_gambit_runtime() {
              runtime_prefix="$1"
              mkdir -p "$runtime_prefix" "$runtime_prefix/bin"
              for gambit_root in "$gambit_prefix" "$gambit_cellar_prefix"; do
                if [ -n "$gambit_root" ]; then
                  if [ -d "$gambit_root/bin" ]; then
                    for gambit_bin in "$gambit_root"/bin/*; do
                      [ -e "$gambit_bin" ] || continue
                      gambit_name="$(basename "$gambit_bin")"
                      target="$runtime_prefix/bin/$gambit_name"
                      if [ "$gambit_name" = "gsc" ] && [ -e "$target" ]; then
                        continue
                      fi
                      if [ -L "$target" ] || [ ! -e "$target" ]; then
                        rm -rf "$target"
                        ln -s "$gambit_bin" "$target"
                      fi
                    done
                  fi
                  for gambit_dir in include lib; do
                    if [ -d "$gambit_root/$gambit_dir" ] && { [ -L "$runtime_prefix/$gambit_dir" ] || [ ! -e "$runtime_prefix/$gambit_dir" ]; }; then
                      rm -rf "$runtime_prefix/$gambit_dir"
                      ln -s "$gambit_root/$gambit_dir" "$runtime_prefix/$gambit_dir"
                    fi
                  done
                fi
              done
              test -d "$runtime_prefix/include"
              test -x "$runtime_prefix/bin/gambuild-C"
              echo "Gambit include: $runtime_prefix/include"
              echo "Gambit builder: $runtime_prefix/bin/gambuild-C"
            }

            seen_runtime_prefixes=""
            for runtime_prefix in $runtime_prefixes; do
              case " $seen_runtime_prefixes " in
                *" $runtime_prefix "*) continue ;;
              esac
              seen_runtime_prefixes="$seen_runtime_prefixes $runtime_prefix"
              link_gambit_runtime "$runtime_prefix"
            done
          fi
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" help >/dev/null
          "$GERBIL_PREFIX/bin/gxi" -e '(displayln "gerbil-ready")'

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-v2-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}-${{ hashFiles('gerbil.pkg') }}
          restore-keys: |
            gerbil-pkg-v2-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}-

      - name: Install Gerbil package dependencies from gerbil.pkg
        env:
          GERBIL_PKG_CACHE_HIT: ${{ steps.gerbil-pkg-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          reset_stale_package_cache() {
            gxpkg uninstall -f \
              github.com/tao3k/gerbil-scheme-language-project-harness \
              git.cons.io/mighty-gerbils/gerbil-poo \
              github.com/mighty-gerbils/gerbil-poo \
              git.cons.io/mighty-gerbils/gerbil-utils \
              github.com/mighty-gerbils/gerbil-utils >/dev/null 2>&1 || true
            rm -rf \
              "$HOME/.gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness" \
              "$HOME/.gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-poo" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-poo" \
              "$HOME/.gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-utils" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-utils" \
              ".gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness" \
              ".gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-poo" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-poo" \
              ".gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-utils" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-utils" \
              ".gerbil/src/github.com/tao3k/gerbil-scheme-language-project-harness" \
              ".gerbil/src/github.com/mighty-gerbils/gerbil-poo" \
              ".gerbil/src/github.com/mighty-gerbils/gerbil-utils"
            rm -f \
              "$HOME/.gerbil/pkg/manifest.ss" \
              "$HOME/.gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness.manifest" \
              "$HOME/.gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-poo.manifest" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-poo.manifest" \
              "$HOME/.gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-utils.manifest" \
              "$HOME/.gerbil/pkg/github.com/mighty-gerbils/gerbil-utils.manifest" \
              ".gerbil/pkg/manifest.ss" \
              ".gerbil/pkg/github.com/tao3k/gerbil-scheme-language-project-harness.manifest" \
              ".gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-poo.manifest" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-poo.manifest" \
              ".gerbil/pkg/git.cons.io/mighty-gerbils/gerbil-utils.manifest" \
              ".gerbil/pkg/github.com/mighty-gerbils/gerbil-utils.manifest"
            gxpkg retag >/dev/null 2>&1 || true
          }
          link_package() {
            local pkg="$1"
            local repo="$2"
            local ref="${3:-}"
            local src=".gerbil/src/$pkg"
            mkdir -p "$(dirname "$src")"
            git clone "$repo" "$src"
            if [ -n "$ref" ]; then
              git -C "$src" checkout "$ref"
            fi
            gxpkg link "$pkg" "$src"
          }
          build_package() {
            GERBIL_BUILD_CORES="$(build_cores)" gxpkg build "$1"
          }
          install_gerbil_package_dependencies() {
            link_package \
              github.com/mighty-gerbils/gerbil-utils \
              https://github.com/mighty-gerbils/gerbil-utils.git
            gxpkg link \
              git.cons.io/mighty-gerbils/gerbil-utils \
              ".gerbil/src/github.com/mighty-gerbils/gerbil-utils"
            build_package git.cons.io/mighty-gerbils/gerbil-utils
            link_package \
              github.com/mighty-gerbils/gerbil-poo \
              https://github.com/mighty-gerbils/gerbil-poo.git \
              f4b322299830acbd1cd5b91984c4107ac56bdac3
            build_package github.com/mighty-gerbils/gerbil-poo
            link_package \
              github.com/tao3k/gerbil-scheme-language-project-harness \
              https://github.com/tao3k/gerbil-scheme-language-project-harness.git \
              16036d84bb4d9ec29bd14c7426eec2f8ceac8223
            build_package github.com/tao3k/gerbil-scheme-language-project-harness
          }
          mkdir -p "$HOME/.gerbil/pkg"
          if [ "$GERBIL_PKG_CACHE_HIT" = "true" ]; then
            echo "Using cached Gerbil package dependencies"
          else
            reset_stale_package_cache
            install_gerbil_package_dependencies
          fi
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ env.GERBIL_REF }}-${{ hashFiles('gerbil.pkg') }}

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail
          build_cores() {
            nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2
          }
          GERBIL_BUILD_CORES="$(build_cores)" gxpkg env ./build.ss compile --release --optimized
          test -x .gerbil/bin/poo-flow
          .gerbil/bin/poo-flow --help >/tmp/poo-flow-help.txt
          test -s /tmp/poo-flow-help.txt

      - name: Package provider binary
        shell: bash
        run: |
          set -euo pipefail
          target="$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m)"
          rm -rf package
          mkdir -p package/bin package/src
          cp .gerbil/bin/poo-flow package/bin/poo-flow
          cp -R src/. package/src/
          cp build.ss gerbil.pkg package/
          chmod +x "package/bin/${BINARY}"
          asset="${BINARY}-${target}.tar.gz"
          echo "ASSET=$asset" >> "$GITHUB_ENV"
          tar -czf "$asset" -C package .
          python3 - "$asset" <<'PY'
          import hashlib
          import pathlib
          import sys

          asset = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          pathlib.Path(f"{asset}.sha256").write_text(f"{digest}  {asset.name}\n")
          PY

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --notes "POO Flow binary release $RELEASE_TAG" \
            || gh release view "$RELEASE_TAG" >/dev/null
          gh release upload "$RELEASE_TAG" "$ASSET" "${ASSET}.sha256" --clobber
