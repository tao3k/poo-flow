name: Python runtime wheel

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: python-runtime-wheel-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  wheel:
    name: Build Python runtime wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POO_FLOW_RUNTIME_V0_LIBRARY: ${{ github.workspace }}/.ci/runtime-c/libpoo_flow_runtime_v0.so
      PROJECTION_HANDOFF_DIR: .ci/python-wheel-projection
      PROJECTION_ARTIFACT: .ci/python-wheel-projection/wheel_smoke.ss.poo-flow-projection.sexp

    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: packages/python-runtime/uv.lock

      - name: Download Scheme projection producer handoff
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-scheme-projection-producer
          path: .ci/python-wheel-projection

      - name: Download runtime-C producer handoff
        uses: actions/download-artifact@v8
        with:
          name: poo-flow-runtime-native-library
          path: .ci/runtime-c

      - name: Verify producer handoffs
        id: producer-handoffs
        shell: bash
        run: |
          set -euo pipefail
          projection_receipt="$PROJECTION_HANDOFF_DIR/producer-receipt.json"
          runtime_receipt="$GITHUB_WORKSPACE/.ci/runtime-c/producer-receipt.json"
          runtime_acceptance="$GITHUB_WORKSPACE/.ci/runtime-c/acceptance-receipt.json"
          runtime_library="$POO_FLOW_RUNTIME_V0_LIBRARY"
          consumer_receipt="$GITHUB_WORKSPACE/.ci/python-wheel-consumer-receipt.json"

          test -s "$PROJECTION_ARTIFACT"
          test -s "$projection_receipt"
          test -s "$runtime_library"
          test -s "$runtime_receipt"
          test -s "$runtime_acceptance"

          jq -e --arg head "$GITHUB_SHA" '
            .schema == "poo-flow.ci.scheme-projection-handoff.v1" and
            .producerJob == "native-linux" and
            .compileOwner == "//scheme:compile" and
            .currentHeadSha == $head and
            .status == 0 and
            .withinBudget == true and
            .artifactAvailable == true
          ' "$projection_receipt" >/dev/null
          projection_digest="$(sha256sum "$PROJECTION_ARTIFACT" | awk '{print $1}')"
          test "$projection_digest" = "$(jq -r '.artifactDigest' "$projection_receipt")"

          jq -e --arg head "$GITHUB_SHA" '
            .schema == "poo-flow.ci.runtime-c-handoff.v1" and
            .producerJob == "native-linux" and
            .producerTarget == "//bindings/runtime-c:runtime_c_shared" and
            .currentHeadSha == $head and
            .artifactAvailable == true and
            .status == 0 and
            .withinBudget == true
          ' "$runtime_receipt" >/dev/null
          jq -e '.status == 0 and .withinBudget == true' \
            "$runtime_acceptance" >/dev/null

          runtime_digest="$(sha256sum "$runtime_library" | awk '{print $1}')"
          expected_runtime_digest="$(jq -r '.artifactDigest' "$runtime_receipt")"
          acceptance_digest="$(sha256sum "$runtime_acceptance" | awk '{print $1}')"
          symbols_digest="$(
            nm -D --defined-only "$runtime_library" \
              | awk '{print $3}' \
              | sed '/^$/d' \
              | LC_ALL=C sort -u \
              | sha256sum \
              | awk '{print $1}'
          )"
          test "$runtime_digest" = "$expected_runtime_digest"
          test "$acceptance_digest" = "$(jq -r '.acceptanceReceiptDigest' "$runtime_receipt")"
          test "$symbols_digest" = "$(jq -r '.exportedSymbolsDigest' "$runtime_receipt")"

          package_projection_dir="packages/python-runtime/src/poo_flow_runtime/projections"
          mkdir -p "$package_projection_dir"
          cp "$PROJECTION_ARTIFACT" "$package_projection_dir/"

          jq -n \
            --arg schema "poo-flow.ci.python-wheel-handoff-consumer.v1" \
            --arg projectionArtifact "python-wheel-scheme-projection-producer" \
            --arg runtimeArtifact "poo-flow-runtime-native-library" \
            --arg transport "github-actions-artifact" \
            --arg projectionDigest "$projection_digest" \
            --arg expectedDigest "$expected_runtime_digest" \
            --arg actualDigest "$runtime_digest" \
            '{schema: $schema, projectionArtifact: $projectionArtifact,
              runtimeArtifact: $runtimeArtifact, transport: $transport,
              projectionDigest: $projectionDigest,
              expectedDigest: $expectedDigest, actualDigest: $actualDigest,
              gerbilSetupAbsent: true, bazelInvocationAbsent: true,
              verified: true}' > "$consumer_receipt"
          echo "receipt=$consumer_receipt" >> "$GITHUB_OUTPUT"

      - name: Upload producer handoff evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-handoff-evidence-${{ runner.os }}-${{ runner.arch }}
          path: |
            .ci/python-wheel-projection/producer-receipt.json
            .ci/runtime-c/producer-receipt.json
            .ci/runtime-c/acceptance-receipt.json
            ${{ steps.producer-handoffs.outputs.receipt }}
          if-no-files-found: warn
          retention-days: 7

      - name: Test Python native runtime against producer library
        run: |
          set -euo pipefail
          uv run --project packages/python-runtime pytest \
            packages/python-runtime/tests/unit/test_native_runtime_v0.py

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build \
            --project packages/python-runtime \
            --wheel \
            --out-dir dist/python-runtime-wheel
          ls -l dist/python-runtime-wheel

      - name: Install wheel in clean environment
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke"
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m pip install \
            dist/python-runtime-wheel/*.whl
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m \
            poo_flow_benchmarks --list
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m \
            poo_flow_runtime.scheme_projection_artifact --help
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m \
            poo_flow_runtime.benchmarks scheme-load-aot --help
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" - <<'PY'
          from poo_flow_runtime._native.loader import probe_native_runtime

          health = probe_native_runtime()
          assert (health.abi_major, health.abi_minor) == (0, 1)
          print("packaged Bazel runtime-v0 negotiation: ok")
          PY
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" - <<'PY'
          import shutil
          from importlib.resources import as_file, files
          from pathlib import Path

          from poo_flow_runtime._scheme_load import load_projection_rows

          for name in ("gxi", "gxc", "gxpkg"):
              assert shutil.which(name) is None, (name, shutil.which(name))

          resource = files("poo_flow_runtime").joinpath("projections/wheel_smoke.ss")
          artifact_resource = files("poo_flow_runtime").joinpath(
              "projections/wheel_smoke.ss.poo-flow-projection.sexp"
          )
          assert resource.is_file()
          assert artifact_resource.is_file()
          with as_file(resource) as source:
              workdir = Path(source).parent / "no-source-tree"
              workdir.mkdir(exist_ok=True)
              loaded = load_projection_rows(source, cwd=workdir, cache=False)

          rows = {}
          for row in loaded:
              rows[str(row[0])] = row[1] if len(row) == 2 else tuple(row[1:])
          plan = {}
          for row in rows["plan"]:
              plan[str(row[0])] = row[1] if len(row) == 2 else tuple(row[1:])
          assert rows["schema"] == "poo-flow.funflow-plan-projection.v1"
          assert rows["origin"] == "use-composition-funflow"
          assert plan["name"] == "wheel-smoke"
          print("packaged no-gerbil artifact load: ok")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: poo-flow-runtime-wheel
          path: dist/python-runtime-wheel/*.whl
          if-no-files-found: error
