name: Python runtime wheel

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-runtime-wheel-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  projection-artifact:
    name: Generate Python runtime projection artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GERBIL_ARCH_PROFILE: portable
      GERBIL_LABEL: source-v0.18.2-07c84815
      GERBIL_REF: 07c8481588a8b07dbf05832687817cd398902ac0
      GERBIL_PREFIX: ${{ github.workspace }}/.ci/gerbil/source-v0.18.2-07c84815
      GERBIL_SRC: ${{ github.workspace }}/.ci/gerbil-src/source-v0.18.2-07c84815
      CCACHE_DIR: ${{ github.workspace }}/.ci/ccache
      CCACHE_MAXSIZE: 2G
      GERBIL_REQUIRE_CCACHE: 1
      PROJECTION_ARTIFACT: bazel-bin/scheme/wheel_smoke.ss.poo-flow-projection.sexp
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Install Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            ccache \
            git \
            jq \
            libsqlite3-dev \
            libssl-dev \
            openssl \
            pkg-config \
            sqlite3 \
            valgrind \
            zlib1g-dev

      - name: Resolve native Gerbil ABI capability
        id: gerbil-native-abi
        shell: bash
        run: |
          set -euo pipefail
          native_abi="$(bash tools/bazel/native_abi_fingerprint.sh gcc "$GERBIL_ARCH_PROFILE")"
          echo "GERBIL_NATIVE_ABI=$native_abi" >> "$GITHUB_ENV"
          echo "fingerprint=$native_abi" >> "$GITHUB_OUTPUT"
          echo "Gerbil native ABI: $native_abi"

      - name: Restore Gerbil bootstrap ccache
        id: gerbil-ccache-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/ccache
          key: gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}-
            ccache-python-runtime-wheel-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}-

      - name: Restore Gerbil install cache
        id: gerbil-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: .ci/gerbil/${{ env.GERBIL_LABEL }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}

      - name: Build Gerbil
        if: steps.gerbil-cache.outputs.cache-hit != 'true'
        run: bash tools/bazel/bootstrap_gerbil_toolchain.sh

      - name: Show Gerbil bootstrap ccache stats
        if: ${{ always() && steps.gerbil-cache.outputs.cache-hit != 'true' }}
        run: ccache --show-stats

      - name: Save Gerbil bootstrap ccache
        if: ${{ always() && steps.gerbil-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/ccache
          key: gerbil-bootstrap-ccache-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Gerbil bootstrap phase receipt
        if: always() && steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gerbil-bootstrap-receipt-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}
          path: .ci/gerbil-src/${{ env.GERBIL_LABEL }}/.poo-flow-bootstrap-state.json
          if-no-files-found: warn
          retention-days: 7

      - name: Save Gerbil install cache
        if: steps.gerbil-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: .ci/gerbil/${{ env.GERBIL_LABEL }}
          key: gerbil-install-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}

      - name: Activate Gerbil
        run: |
          set -euo pipefail
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          gsc_wrapper="$RUNNER_TEMP/gerbil-gsc"
          {
            printf '#!/bin/sh\n'
            printf 'exec "%s" "-:~~=%s,~~bin=%s,~~include=%s,~~lib=%s" "$@"\n' "$GERBIL_PREFIX/bin/gsc" "$GERBIL_PREFIX" "$GERBIL_PREFIX/bin" "$GERBIL_PREFIX/include" "$GERBIL_PREFIX/lib"
          } > "$gsc_wrapper"
          chmod +x "$gsc_wrapper"
          echo "GERBIL_GSC=$gsc_wrapper" >> "$GITHUB_ENV"
          "$GERBIL_PREFIX/bin/gxi" --version
          "$GERBIL_PREFIX/bin/gxpkg" help >/dev/null
          "$gsc_wrapper" -v
          tmp_smoke="$(mktemp -d)"
          printf '(display "ok")\n' > "$tmp_smoke/gsc-smoke.scm"
          "$gsc_wrapper" -target C "$tmp_smoke/gsc-smoke.scm"
          test -f "$tmp_smoke/gsc-smoke.o1"

      # setup-bazel restores the latest matching lineage when this BUILD hash
      # misses, then saves the enriched projection cache under this generation.
      - name: Fork Bazel disk-cache generation from native producer
        shell: bash
        env:
          POO_FLOW_BAZEL_CACHE_GENERATION: ${{ github.sha }}-python-wheel
        run: |
          set -euo pipefail
          mkdir -p .ci/bazel-cache-generation
          printf '# POO Flow CI cache generation: %s\n' \
            "$POO_FLOW_BAZEL_CACHE_GENERATION" \
            > .ci/bazel-cache-generation/BUILD.bazel

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
          disk-cache: ci-${{ runner.os }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}
          repository-cache: true

      - name: Restore Gerbil package dependency cache
        id: gerbil-pkg-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}-${{ hashFiles('gerbil.pkg', 'manifest.ss') }}

      - name: Install Gerbil package dependencies from gerbil.pkg
        run: |
          set -euo pipefail
          package_cache_ready=false
          if [ -d .gerbil/lib ]; then
            if GERBIL_PATH="$GITHUB_WORKSPACE/.gerbil" \
              gxi tools/ci/gerbil-deps-ready.ss; then
              package_cache_ready=true
            else
              echo "Cached Gerbil packages are missing compiled dependency libraries; rebuilding"
            fi
          fi
          if [ "$package_cache_ready" = "true" ]; then
            echo "Using cached Gerbil package dependency build products"
          else
            bazel run //scheme:deps
          fi
          gxpkg list

      - name: Save Gerbil package dependency cache
        if: steps.gerbil-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: |
            ~/.gerbil/pkg
            .gerbil
          key: gerbil-pkg-${{ runner.os }}-${{ runner.arch }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}-${{ env.GERBIL_REF }}-${{ hashFiles('gerbil.pkg', 'manifest.ss') }}

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python-runtime/uv.lock

      - name: Restore canonical Scheme action from native CI lineage
        id: scheme-compile
        timeout-minutes: 8
        env:
          CACHE_GENERATION: ${{ github.sha }}-python-wheel
          CACHE_LINEAGE: ci-${{ runner.os }}-${{ env.GERBIL_LABEL }}-${{ steps.gerbil-native-abi.outputs.fingerprint }}
          COMPILE_BUDGET_SECONDS: ${{ github.event_name == 'workflow_dispatch' && '480' || '30' }}
        shell: bash
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/python-wheel-scheme-compile-profile.gz"
          log="$RUNNER_TEMP/python-wheel-scheme-compile.log"
          receipt="$RUNNER_TEMP/python-wheel-scheme-compile-ci-receipt.json"
          start_seconds=$SECONDS

          set +e
          timeout "${COMPILE_BUDGET_SECONDS}s" \
            bazel build --profile="$profile" //scheme:compile 2>&1 | tee "$log"
          build_status=${PIPESTATUS[0]}
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          disk_cache_hits=$(awk '
            match($0, /([0-9]+) disk cache hit/, count) { hits += count[1] }
            END { print hits + 0 }
          ' "$log")
          scheme_receipt="bazel-bin/scheme/compile.receipt.json"
          jq -n \
            --arg schema "poo-flow.ci.bazel-phase-receipt.v1" \
            --arg phase "python-wheel-scheme-compile-consumer" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --arg generation "$CACHE_GENERATION" \
            --arg generationRole "consumer-enriched" \
            --arg cacheLineage "$CACHE_LINEAGE" \
            --arg restoreMode "lineage-prefix" \
            --argjson status "$build_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$COMPILE_BUDGET_SECONDS" \
            --argjson diskCacheHits "$disk_cache_hits" \
            --argjson schemeReceiptAvailable "$([[ -f "$scheme_receipt" ]] && printf true || printf false)" \
            '{schema: $schema, phase: $phase, runner: $runner,
            generation: $generation, generationRole: $generationRole,
            cacheLineage: $cacheLineage, restoreMode: $restoreMode,
              status: $status, elapsedSeconds: $elapsedSeconds,
              budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds),
              diskCacheHits: $diskCacheHits,
              schemeReceiptAvailable: $schemeReceiptAvailable}' > "$receipt"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "log=$log" >> "$GITHUB_OUTPUT"
          echo "receipt=$receipt" >> "$GITHUB_OUTPUT"

          if (( build_status != 0 )); then
            exit "$build_status"
          fi
          if (( elapsed_seconds > COMPILE_BUDGET_SECONDS )); then
            echo "Scheme action restore exceeded ${COMPILE_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" != workflow_dispatch ]] && (( disk_cache_hits < 1 )); then
            echo "Expected the prerequisite native CI lineage to contain the Scheme action" >&2
            exit 1
          fi

      - name: Build packaged Scheme projection through Bazel
        id: scheme-projection
        timeout-minutes: 2
        env:
          PROJECTION_BUDGET_SECONDS: 120
        shell: bash
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/python-wheel-scheme-projection-profile.gz"
          receipt="$RUNNER_TEMP/python-wheel-scheme-projection-ci-receipt.json"
          start_seconds=$SECONDS

          set +e
          bazel build \
            --profile="$profile" \
            //scheme:wheel_smoke_projection_artifact
          build_status=$?
          set -e

          elapsed_seconds=$((SECONDS - start_seconds))
          jq -n \
            --arg schema "poo-flow.ci.bazel-phase-receipt.v1" \
            --arg phase "python-wheel-scheme-projection" \
            --arg runner "${RUNNER_OS}-${RUNNER_ARCH}" \
            --argjson status "$build_status" \
            --argjson elapsedSeconds "$elapsed_seconds" \
            --argjson budgetSeconds "$PROJECTION_BUDGET_SECONDS" \
            --argjson artifactAvailable "$([[ -s "$PROJECTION_ARTIFACT" ]] && printf true || printf false)" \
            '{schema: $schema, phase: $phase, runner: $runner,
              status: $status, elapsedSeconds: $elapsedSeconds,
              budgetSeconds: $budgetSeconds,
              withinBudget: ($elapsedSeconds <= $budgetSeconds),
              artifactAvailable: $artifactAvailable}' > "$receipt"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "receipt=$receipt" >> "$GITHUB_OUTPUT"

          if (( build_status != 0 )); then
            exit "$build_status"
          fi
          if (( elapsed_seconds > PROJECTION_BUDGET_SECONDS )); then
            echo "Scheme projection exceeded ${PROJECTION_BUDGET_SECONDS}s budget" >&2
            exit 1
          fi
          test -s "$PROJECTION_ARTIFACT"

      - name: Upload Python wheel Scheme evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-scheme-evidence-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ steps.scheme-compile.outputs.profile }}
            ${{ steps.scheme-compile.outputs.log }}
            ${{ steps.scheme-compile.outputs.receipt }}
            ${{ steps.scheme-projection.outputs.profile }}
            ${{ steps.scheme-projection.outputs.receipt }}
            bazel-bin/scheme/compile.receipt.json
            bazel-bin/scheme/compile.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build Bazel runtime library
        run: |
          set -euo pipefail
          bazel build //bindings/runtime-c:runtime_c_shared
          library="$GITHUB_WORKSPACE/bazel-bin/bindings/runtime-c/libruntime_c_shared.so"
          test -f "$library"
          mkdir -p .ci/runtime-c
          cp "$library" .ci/runtime-c/libpoo_flow_runtime_v0.so
          echo "POO_FLOW_RUNTIME_V0_LIBRARY=$GITHUB_WORKSPACE/.ci/runtime-c/libpoo_flow_runtime_v0.so" >> "$GITHUB_ENV"

      - name: Run Bazel runtime acceptance matrix
        run: |
          set -euo pipefail
          bazel build \
            //bindings/runtime-c:runtime_c_static \
            //bindings/runtime-c:runtime_c_shared
          bazel test \
            //bindings/runtime-c:runtime_c_tests \
            //bindings/runtime-c:runtime_c_sanitizer_tests \
            //bindings/runtime-c:runtime_c_leak_test \
            //bindings/runtime-c:runtime_v0_batch_benchmark_smoke \
            //bindings/runtime-c:runtime_v0_gerbil_ffi_benchmark

      - name: Reject stale runtime-C Make routes
        run: tools/ci/check-runtime-c-build-boundary

      - name: Test Python native runtime against Bazel library
        run: |
          set -euo pipefail
          uv run --project packages/python-runtime pytest \
            packages/python-runtime/tests/unit/test_native_runtime_v0.py

      - name: Upload projection artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: poo-flow-runtime-projection-artifacts
          path: ${{ env.PROJECTION_ARTIFACT }}
          if-no-files-found: error

      - name: Upload Bazel runtime library
        uses: actions/upload-artifact@v6.0.0
        with:
          name: poo-flow-runtime-native-library
          path: .ci/runtime-c/libpoo_flow_runtime_v0.so
          if-no-files-found: error

  wheel:
    name: Build Python runtime wheel
    runs-on: ubuntu-latest
    needs: projection-artifact
    timeout-minutes: 15
    env:
      POO_FLOW_RUNTIME_V0_LIBRARY: ${{ github.workspace }}/.ci/runtime-c/libpoo_flow_runtime_v0.so
    steps:
      - name: Checkout poo-flow
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python-runtime/uv.lock

      - name: Download generated projection artifact
        uses: actions/download-artifact@v6.0.0
        with:
          name: poo-flow-runtime-projection-artifacts
          path: packages/python-runtime/src/poo_flow_runtime/projections

      - name: Download Bazel runtime library
        uses: actions/download-artifact@v6.0.0
        with:
          name: poo-flow-runtime-native-library
          path: .ci/runtime-c

      - name: Verify generated projection artifact
        run: |
          set -euo pipefail
          test -s packages/python-runtime/src/poo_flow_runtime/projections/wheel_smoke.ss.poo-flow-projection.sexp

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build \
            --project packages/python-runtime \
            --wheel \
            --out-dir dist/python-runtime-wheel
          ls -l dist/python-runtime-wheel

      - name: Install wheel in clean environment
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke"
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m pip install \
            dist/python-runtime-wheel/*.whl
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m \
            poo_flow_runtime.scheme_projection_artifact --help
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" -m \
            poo_flow_runtime.benchmarks scheme-load-aot --help
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" - <<'PY'
          from poo_flow_runtime._native.loader import probe_native_runtime

          health = probe_native_runtime()
          assert (health.abi_major, health.abi_minor) == (0, 1)
          print("packaged Bazel runtime-v0 negotiation: ok")
          PY
          "$RUNNER_TEMP/poo-flow-runtime-wheel-smoke/bin/python" - <<'PY'
          import shutil
          from importlib.resources import as_file, files
          from pathlib import Path

          from poo_flow_runtime._scheme_load import load_projection_rows

          for name in ("gxi", "gxc", "gxpkg"):
              assert shutil.which(name) is None, (name, shutil.which(name))

          resource = files("poo_flow_runtime").joinpath("projections/wheel_smoke.ss")
          artifact_resource = files("poo_flow_runtime").joinpath(
              "projections/wheel_smoke.ss.poo-flow-projection.sexp"
          )
          assert resource.is_file()
          assert artifact_resource.is_file()
          with as_file(resource) as source:
              workdir = Path(source).parent / "no-source-tree"
              workdir.mkdir(exist_ok=True)
              loaded = load_projection_rows(source, cwd=workdir, cache=False)

          rows = {}
          for row in loaded:
              rows[str(row[0])] = row[1] if len(row) == 2 else tuple(row[1:])
          plan = {}
          for row in rows["plan"]:
              plan[str(row[0])] = row[1] if len(row) == 2 else tuple(row[1:])
          assert rows["schema"] == "poo-flow.funflow-plan-projection.v1"
          assert rows["origin"] == "use-composition-funflow"
          assert plan["name"] == "wheel-smoke"
          print("packaged no-gerbil artifact load: ok")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: poo-flow-runtime-wheel
          path: dist/python-runtime-wheel/*.whl
          if-no-files-found: error
