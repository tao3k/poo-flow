name: Runtime WASM package

on:
  push:
    branches: [main]
    paths:
      - bindings/runtime-wasm/**
      - bindings/runtime-c/bundle-v1/**
      - BUILD.bazel
      - runtime-wasm-generator-build.ss
      - src/core/plan.ss
      - src/feature-system/bundle-v1-*.ss
      - src/module-system/profile-composition.ss
      - src/module-system/profile-composition-*.ss
      - t/profile-composition-test.ss
      - .github/workflows/runtime-wasm-package.yml
  pull_request:
    paths:
      - bindings/runtime-wasm/**
      - bindings/runtime-c/bundle-v1/**
      - BUILD.bazel
      - runtime-wasm-generator-build.ss
      - src/core/plan.ss
      - src/feature-system/bundle-v1-*.ss
      - src/module-system/profile-composition.ss
      - src/module-system/profile-composition-*.ss
      - t/profile-composition-test.ss
      - .github/workflows/runtime-wasm-package.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-wasm-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-build:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Gerbil and WebAssembly toolchain
        shell: bash
        run: |
          brew list --formula ghostscript >/dev/null 2>&1 && brew unlink ghostscript || true
          brew install jq openssl pkg-config sqlite zlib emscripten binaryen bazelisk
          formula="tao3k/gerbil/gerbil-scheme"
          brew install --force-bottle "$formula"
          formula_info="$(brew info --json=v2 "$formula" 2>/dev/null)"
          poured_from_bottle="$(jq -r '.formulae[0].installed[-1].poured_from_bottle // false' <<< "$formula_info")"
          test "$poured_from_bottle" = true

      - name: Declare Bazel disk-cache generation
        shell: bash
        env:
          POO_FLOW_BAZEL_CACHE_GENERATION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ci/bazel-cache-generation
          printf '# POO Flow Runtime-WASM cache generation: %s\n' \
            "$POO_FLOW_BAZEL_CACHE_GENERATION" \
            > .ci/bazel-cache-generation/BUILD.bazel

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          cache-version: 1
          disk-cache: runtime-wasm-${{ runner.os }}
          repository-cache: true

      - name: Verify Bazel module lock
        run: bazelisk mod deps --lockfile_mode=error

      - name: Resolve shared Gerbil capability
        shell: bash
        run: |
          set -euo pipefail
          native_abi="$(
            bazelisk run --ui_event_filters=-info --noshow_progress \
              @gerbil_bazel//gerbil:native_abi_fingerprint 2>/dev/null
          )"
          test "${#native_abi}" -eq 40
          echo "GERBIL_NATIVE_ABI=$native_abi" >> "$GITHUB_ENV"

      - name: Install Gerbil project dependencies
        run: bazelisk run @local_gerbil//:install_dependencies

      - name: Materialize POO Flow Gerbil project
        shell: bash
        run: |
          bazelisk build //scheme:dependency_packages
          bazelisk build //scheme:runtime_wasm_generator_compile
          bazelisk test //scheme:runtime_wasm_generator_compile_receipt_v1_test
          test -z "$(bazelisk query 'somepath(//scheme:runtime_wasm_generator_compile, //scheme:gslph_package)')"
          test -n "$(bazelisk query 'somepath(//scheme:runtime_wasm_generator_compile, //scheme:gerbil_poo_package)')"
          bazelisk run //scheme:runtime_wasm_generator_materialize
          test -f .gerbil/lib/clan/poo/object.ssi
          test -f .gerbil/lib/clan/base.ssi
          test -f .gerbil/lib/poo-flow/src/core/flow.ssi

      - name: Build, test, and pack the package
        shell: bash
        run: |
          cp LICENSE bindings/runtime-wasm/LICENSE
          npm pack ./bindings/runtime-wasm --dry-run
          cp -R bindings/runtime-wasm/workflows "$RUNNER_TEMP/workflows-first"
          npm --prefix bindings/runtime-wasm run generate
          diff -ru "$RUNNER_TEMP/workflows-first" bindings/runtime-wasm/workflows
          archive_json="$(npm pack ./bindings/runtime-wasm --ignore-scripts --json --pack-destination "$RUNNER_TEMP")"
          archive="$(jq -r '.[0].filename' <<< "$archive_json")"
          payload="$RUNNER_TEMP/poo-flow-runtime-wasm-package"
          mkdir -p "$payload"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$payload" --strip-components=1
          printf '%s\n' "$GITHUB_SHA" > "$payload/.poo-flow-source-rev"

      - name: Upload verified package payload
        uses: actions/upload-artifact@v7
        with:
          name: poo-flow-runtime-wasm-package-payload
          path: ${{ runner.temp }}/poo-flow-runtime-wasm-package
          include-hidden-files: true
          if-no-files-found: error

  publish-package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: source-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified package payload
        uses: actions/download-artifact@v8
        with:
          name: poo-flow-runtime-wasm-package-payload
          path: ${{ runner.temp }}/package-payload

      - name: Materialize independent package branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch_dir="$RUNNER_TEMP/npm-package-branch"
          git clone --filter=blob:none --no-checkout "https://x-access-token:$GH_TOKEN@github.com/$GITHUB_REPOSITORY.git" "$branch_dir"
          git -C "$branch_dir" checkout --orphan npm-package-next
          git -C "$branch_dir" rm -rf .
          cp -R "$RUNNER_TEMP/package-payload/." "$branch_dir/"
          git -C "$branch_dir" add -A
          (
            cd "$RUNNER_TEMP/package-payload"
            find . -type f -print | sed 's#^./##' | LC_ALL=C sort
          ) > "$RUNNER_TEMP/expected-package-files"
          git -C "$branch_dir" ls-files | LC_ALL=C sort > "$RUNNER_TEMP/actual-package-files"
          diff -u "$RUNNER_TEMP/expected-package-files" "$RUNNER_TEMP/actual-package-files"
          git -C "$branch_dir" -c user.name=github-actions -c user.email=41898282+github-actions[bot]@users.noreply.github.com commit -m "package: $GITHUB_SHA"
          git -C "$branch_dir" push origin HEAD:refs/heads/npm-package --force
